name: laravel-ci

# Supplementary quality + supply-chain gate for the GitHub mirror.
# The real build/test/deploy pipeline lives in .gitlab-ci.yml (GitLab is primary).
# This runs a fast PHP-only check: Pest, Pint and a Composer security audit.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: laravel-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Pest, Pint & audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up PHP
        # PHP version tracks .lando.yml (which matches production). Bump both together.
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.4'
          coverage: none

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Authenticate Flux Pro
        run: composer config --global --auth http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Build frontend assets
        run: npm run build

      - name: Prepare application environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests (Pest)
        run: php artisan test --parallel

      - name: Check code style (Pint)
        if: ${{ !cancelled() }}
        run: vendor/bin/pint --test

      - name: Security audit (Composer)
        if: ${{ !cancelled() }}
        run: composer audit
